name: CI/CD Pipeline - Insurance Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlflow-retrain-dockerize:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
        
    - name: Verify Python Version
      run: python --version

    - name: Install Required Packages
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 dagshub pandas scikit-learn matplotlib seaborn numpy

    - name: Execute MLflow Project
      run: |
        cd MLProject
        mlflow run . --env-manager local
        
    - name: Extract MLflow Run ID
      id: extract_run_id
      run: |
        cd MLProject
        # Mengambil run_id dari folder mlruns lokal
        LATEST_RUN_ID=$(ls mlruns/0 | grep -v meta.yaml | head -n 1)
        echo "RUN_ID=$LATEST_RUN_ID" >> $GITHUB_ENV
        
    - name: Install Extra Python Dependencies
      run: echo "Semua dependency sudah berhasil diinstal sebelumnya"

    - name: Upload Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-artifacts
        path: MLProject/mlruns/

    - name: Build Docker Image from MLflow Model
      run: |
        cd MLProject
        
        # Patch/Hotfix untuk bug MLflow 2.19.0 terkait instalasi pip di Python 3.9
        find /opt/hostedtoolcache/Python -name docker_utils.py -exec sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' {} +
        
        # Build image menggunakan build-docker dari MLflow
        mlflow models build-docker -m "mlruns/0/${{ env.RUN_ID }}/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/insurance-model-ci:latest"
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Tag Image Version
      run: |
        docker tag "${{ secrets.DOCKER_USERNAME }}/insurance-model-ci:latest" "${{ secrets.DOCKER_USERNAME }}/insurance-model-ci:v1.0"
        
    - name: Push Images to Docker Hub
      run: |
        docker push "${{ secrets.DOCKER_USERNAME }}/insurance-model-ci:latest"
        docker push "${{ secrets.DOCKER_USERNAME }}/insurance-model-ci:v1.0"
